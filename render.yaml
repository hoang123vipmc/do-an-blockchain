services:
  - type: web
    name: do-an-blockchain
    env: docker
    region: singapore
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: users.db
      - key: BLOCKCHAIN_DB_PATH
        value: blockchain_data.json
